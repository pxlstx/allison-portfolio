<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Allison Sarno — Work</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink: #0E0E0C;
  --ink2: #1A1A17;
  --w100: #FFFFFF;
  --w60: rgba(255,255,255,0.6);
  --w30: rgba(255,255,255,0.3);
  --w15: rgba(255,255,255,0.15);
  --orange: #D4622A;
  --bdr: rgba(255,255,255,0.12);
  --bdr-bright: rgba(255,255,255,0.85);
  --font: 'Helvetica Neue', Arial, sans-serif;
}

html { font-family: var(--font); background: var(--ink); color: var(--w100); cursor: none; }

#cur { position: fixed; width: 8px; height: 8px; background: var(--w100); border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); transition: width .2s, height .2s; mix-blend-mode: difference; }
#cur.big { width: 44px; height: 44px; }

#hbg { position: fixed; top: 28px; right: 36px; z-index: 999; display: flex; flex-direction: column; gap: 5px; cursor: none; padding: 8px; }
#hbg span { display: block; width: 22px; height: 1px; background: var(--w100); }

#menu { position: fixed; inset: 0; background: var(--ink); z-index: 998; display: flex; flex-direction: column; align-items: flex-start; justify-content: center; padding: 80px; opacity: 0; pointer-events: none; transition: opacity .35s; }
#menu.on { opacity: 1; pointer-events: all; }
#menu ul { list-style: none; }
#menu ul li a { display: block; font-size: clamp(36px,5.5vw,64px); font-weight: 300; color: var(--w100); text-decoration: none; opacity: .2; transition: opacity .2s, letter-spacing .25s; letter-spacing: -.03em; }
#menu ul li a:hover { opacity: 1; letter-spacing: -.01em; }
#menu .mc { position: absolute; bottom: 48px; left: 80px; }
#menu .mc a { display: block; font-size: 13px; color: var(--w30); text-decoration: none; font-weight: 300; margin-bottom: 4px; }

/* ── PAGE HEADER ── */
.page-header {
  padding: 120px 48px 64px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 40px;
  border-bottom: 1px solid rgba(255,255,255,0.06);
}

.page-header h1 {
  font-size: clamp(52px, 8vw, 106px);
  font-weight: 200;
  color: var(--w100);
  letter-spacing: -.04em;
  line-height: .95;
}

/* ── TOGGLE ── */
.toggle-wrap { display: flex; gap: 2px; padding-bottom: 6px; flex-shrink: 0; }
.toggle-btn {
  font-family: var(--font);
  font-size: 11px;
  font-weight: 400;
  color: var(--w30);
  background: none;
  border: 1px solid rgba(255,255,255,0.12);
  padding: 9px 18px;
  cursor: none;
  transition: color .2s, background .2s, border-color .2s;
  letter-spacing: .01em;
}
.toggle-btn:first-child { border-radius: 2px 0 0 2px; }
.toggle-btn:last-child { border-radius: 0 2px 2px 0; }
.toggle-btn.active { color: var(--ink); background: var(--w100); border-color: var(--w100); }

/* ── GRID ── */
.grid-wrap { padding: 48px; transition: opacity .3s ease; }
.grid-wrap.shuffling { opacity: 0; }

.grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 48px 32px; /* generous vertical gap for editorial breathing room */
}

/* ── CARD ── */
.card {
  display: flex;
  flex-direction: column;
  cursor: none;
  border: 1px solid var(--bdr);
  padding: 16px;
  transition: border-color .3s ease, opacity .5s ease, transform .5s ease;
  opacity: 0;
  transform: translateY(24px);
}

.card.visible {
  opacity: 1;
  transform: translateY(0);
}

.card:hover { border-color: var(--bdr-bright); }

/* Image frame — no border, just overflow clip */
.card-frame {
  position: relative;
  overflow: hidden;
  margin-bottom: 16px;
}

.card-img {
  width: 100%;
  height: 100%;
  display: block;
  object-fit: cover;
  filter: brightness(0.72);
  transition: filter .35s ease;
}

.card:hover .card-img { filter: brightness(0.92); }

/* NDA lock */
.card-lock {
  position: absolute;
  top: 12px; left: 12px;
  width: 24px; height: 24px;
  border-radius: 50%;
  background: rgba(14,14,12,.7);
  backdrop-filter: blur(6px);
  border: 1px solid rgba(255,255,255,0.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 10px;
  z-index: 2;
}

/* Card info — outside below image */
.card-info { padding: 0; }

.card-client {
  font-size: 11px;
  font-weight: 500;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--orange);
  margin-bottom: 8px;
}

.card-title {
  font-size: clamp(16px, 1.6vw, 22px);
  font-weight: 300;
  color: var(--w60);
  letter-spacing: -.02em;
  line-height: 1.3;
  transition: color .25s ease;
}

.card:hover .card-title { color: var(--w100); }

/* NDA note */
.card-nda-note {
  font-size: 13px;
  font-weight: 300;
  color: var(--w30);
  margin-top: 4px;
  letter-spacing: .01em;
}

/* ── ALL GRID SPANS — consistent widths per row ── */
/* Row 1: 2 across — 6+6 */
.a1, .a2 { grid-column: span 6; }
.a1 .card-frame, .a2 .card-frame { aspect-ratio: 16/10; }

/* Row 2: 3 across — 4+4+4 */
.a3, .a4, .a5 { grid-column: span 4; }
.a3 .card-frame, .a4 .card-frame, .a5 .card-frame { aspect-ratio: 4/3; }

/* Row 3: 2 across — 6+6 */
.a6, .a7 { grid-column: span 6; }
.a6 .card-frame, .a7 .card-frame { aspect-ratio: 16/10; }

/* Row 4: 3 across — 4+4+4 */
.a8, .a9, .a10 { grid-column: span 4; }
.a8 .card-frame, .a9 .card-frame, .a10 .card-frame { aspect-ratio: 4/3; }

/* ── PRODUCT SPANS — 2 then 3 ── */
.p1, .p2 { grid-column: span 6; }
.p1 .card-frame, .p2 .card-frame { aspect-ratio: 16/10; }
.p3, .p4, .p5 { grid-column: span 4; }
.p3 .card-frame, .p4 .card-frame, .p5 .card-frame { aspect-ratio: 4/3; }

/* ── BRAND SPANS — 3 then 2 ── */
.b1, .b2, .b3 { grid-column: span 4; }
.b1 .card-frame, .b2 .card-frame, .b3 .card-frame { aspect-ratio: 4/3; }
.b4, .b5 { grid-column: span 6; }
.b4 .card-frame, .b5 .card-frame { aspect-ratio: 16/10; }

/* ── FOOTER ── */
footer { border-top: 1px solid rgba(255,255,255,0.06); padding: 32px 48px; display: flex; justify-content: space-between; align-items: center; margin-top: 24px; }
.fl { font-size: 14px; font-weight: 300; color: var(--w30); }
footer ul { display: flex; gap: 24px; list-style: none; }
footer ul a { font-size: 12px; font-weight: 300; color: var(--w15); text-decoration: none; transition: color .2s; }
footer ul a:hover { color: var(--w60); }
.fc { font-size: 11px; color: var(--w15); }

@media (max-width: 900px) {
  .page-header { padding: 80px 24px 48px; flex-direction: column; align-items: flex-start; }
  .grid-wrap { padding: 24px; }
  .grid { gap: 32px 20px; }
  .a1,.a2,.p1,.p2,.b1,.b2 { grid-column: span 12; }
  .a3,.a4,.a5,.p3,.p4,.p5,.b3,.b4,.b5 { grid-column: span 6; }
  .a6,.a7,.a8,.a9,.a10 { grid-column: span 12; }
  .a3 .card-frame,.a4 .card-frame,.a5 .card-frame,
  .p3 .card-frame,.p4 .card-frame,.p5 .card-frame,
  .b3 .card-frame,.b4 .card-frame,.b5 .card-frame { aspect-ratio: 16/9; }
  footer { padding: 28px 24px; flex-direction: column; gap: 16px; }
}
</style>
</head>
<body>

<div id="cur"></div>
<div id="hbg"><span></span><span></span><span></span></div>

<div id="menu">
  <ul>
    <li><a href="#">Home</a></li>
    <li><a href="#">Work</a></li>
    <li><a href="#">About</a></li>
    <li><a href="#">Writing</a></li>
    <li><a href="#">Ask me</a></li>
  </ul>
  <div class="mc">
    <a href="#">hello@allisonsarno.com</a>
    <a href="#">LinkedIn</a>
  </div>
</div>

<div class="page-header">
  <h1>Work</h1>
  <div class="toggle-wrap">
    <button class="toggle-btn active" onclick="setFilter('all')" id="btn-all">All</button>
    <button class="toggle-btn" onclick="setFilter('product')" id="btn-product">Product & UX</button>
    <button class="toggle-btn" onclick="setFilter('brand')" id="btn-brand">Brand & Visual</button>
  </div>
</div>

<div class="grid-wrap" id="grid-wrap">
  <div class="grid" id="grid"></div>
</div>

<footer>
  <div class="fl">Allison Sarno</div>
  <ul><li><a href="#">LinkedIn</a></li><li><a href="#">Instagram</a></li><li><a href="#">hello@allisonsarno.com</a></li></ul>
  <div class="fc">© 2025</div>
</footer>

<script>
const cur = document.getElementById('cur');
document.addEventListener('mousemove', e => {
  cur.style.left = e.clientX + 'px';
  cur.style.top = e.clientY + 'px';
});

const hbg = document.getElementById('hbg');
const menu = document.getElementById('menu');
hbg.addEventListener('click', () => menu.classList.toggle('on'));
menu.addEventListener('click', e => { if (e.target === menu) menu.classList.remove('on'); });

const seeds = {
  p1:'10', p2:'20', p3:'30', p4:'40', p5:'50',
  b1:'60', b2:'70', b3:'80', b4:'90', b5:'100'
};

const projects = {
  product: [
    { id:'p1', client:'Unique.AI',  title:'UX design for an AI-enabled compliance platform for private banks', nda:true, ndaMsg:'Password protected — request access' },
    { id:'p2', client:'Expeerly',   title:'Full platform redesign, design system, and marketing site for a Swiss video review platform' },
    { id:'p3', client:'Everskin',   title:'End-to-end experience design across website, client app, and practitioner iPad app' },
    { id:'p4', client:'TomoDomo',   title:'Internal room management system and consumer-facing booking flow, designed end to end' },
    { id:'p5', client:'Ava',        title:'Mobile product design, brand identity, and creative leadership for a funded Swiss femtech startup' },
  ],
  brand: [
    { id:'b1', client:'Expeerly',     title:'Visual identity, typography, and brand guidelines for a Swiss video review platform' },
    { id:'b2', client:'TomoDomo',     title:'Logo, visual language, and brand system for a Swiss coworking and space booking platform' },
    { id:'b3', client:'Nuavo',        title:'Full brand identity from naming through to visual system for a Zurich startup' },
    { id:'b4', client:'Kumi',         title:'Premium visual identity and brand system for a South African real estate company' },
    { id:'b5', client:'Peak Product', title:'Brand identity and positioning for a senior product leadership coaching practice' },
  ]
};

const allSpans     = ['a1','a2','a3','a4','a5','a6','a7','a8','a9','a10'];
const productSpans = ['p1','p2','p3','p4','p5'];
const brandSpans   = ['b1','b2','b3','b4','b5'];

const allOrder = [
  projects.product[0], // Unique.AI — large
  projects.product[1], // Expeerly product
  projects.product[2], // Everskin
  projects.brand[0],   // Expeerly brand
  projects.brand[2],   // Nuavo
  projects.brand[3],   // Kumi
  projects.product[3], // TomoDomo product
  projects.brand[1],   // TomoDomo brand
  projects.product[4], // Ava
  projects.brand[4],   // Peak Product
];

function makeCard(p, spanClass) {
  const seed = seeds[p.id] || '10';
  const div = document.createElement('div');
  div.className = `card ${spanClass}`;

  let frameInner = `<img class="card-img" src="https://picsum.photos/seed/${seed}/1200/900" alt="${p.client}">`;
  if (p.nda) frameInner += `<div class="card-lock">🔒</div>`;

  div.innerHTML = `
    <div class="card-frame">${frameInner}</div>
    <div class="card-info">
      <div class="card-client">${p.client}</div>
      <div class="card-title">${p.title}</div>
      ${p.nda ? `<div class="card-nda-note">${p.ndaMsg}</div>` : ''}
    </div>`;

  div.addEventListener('mouseenter', () => cur.classList.add('big'));
  div.addEventListener('mouseleave', () => cur.classList.remove('big'));
  return div;
}

let currentFilter = 'all';
const gridWrap = document.getElementById('grid-wrap');
const grid = document.getElementById('grid');

function animateCards() {
  const cards = grid.querySelectorAll('.card');
  cards.forEach((card, i) => {
    setTimeout(() => card.classList.add('visible'), i * 60);
  });
}

function renderGrid(filter) {
  gridWrap.classList.add('shuffling');
  setTimeout(() => {
    grid.innerHTML = '';
    if (filter === 'all') {
      allOrder.forEach((p, i) => grid.appendChild(makeCard(p, allSpans[i])));
    } else if (filter === 'product') {
      projects.product.forEach((p, i) => grid.appendChild(makeCard(p, productSpans[i])));
    } else {
      projects.brand.forEach((p, i) => grid.appendChild(makeCard(p, brandSpans[i])));
    }
    gridWrap.classList.remove('shuffling');
    requestAnimationFrame(animateCards);
  }, 300);
}

function setFilter(type) {
  if (type === currentFilter) return;
  currentFilter = type;
  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + type).classList.add('active');
  renderGrid(type);
  window.scrollTo(0, 0);
}

renderGrid('all');
</script>
</body>
</html>
