<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Allison Sarno — Work</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink: #0E0E0C;
  --ink2: #1A1A17;
  --w100: #FFFFFF;
  --w60: rgba(255,255,255,0.6);
  --w30: rgba(255,255,255,0.3);
  --w15: rgba(255,255,255,0.15);
  --bdr: rgba(255,255,255,0.07);
  --font: 'Helvetica Neue', Arial, sans-serif;
}

html { font-family: var(--font); background: var(--ink); color: var(--w100); cursor: none; }

#cur { position: fixed; width: 8px; height: 8px; background: var(--w100); border-radius: 50%; pointer-events: none; z-index: 9999; transform: translate(-50%,-50%); transition: width .25s, height .25s; mix-blend-mode: difference; }
#cur.big { width: 52px; height: 52px; }
#cur-label { position: fixed; pointer-events: none; z-index: 9998; transform: translate(-50%,-50%); font-size: 10px; font-weight: 500; letter-spacing: .06em; color: var(--ink); opacity: 0; transition: opacity .2s; }
#cur-label.on { opacity: 1; }

#hbg { position: fixed; top: 28px; right: 36px; z-index: 999; display: flex; flex-direction: column; gap: 5px; cursor: none; padding: 8px; }
#hbg span { display: block; width: 22px; height: 1px; background: var(--w100); }

#menu { position: fixed; inset: 0; background: var(--ink); z-index: 998; display: flex; flex-direction: column; align-items: flex-start; justify-content: center; padding: 80px; opacity: 0; pointer-events: none; transition: opacity .35s; }
#menu.on { opacity: 1; pointer-events: all; }
#menu ul { list-style: none; }
#menu ul li a { display: block; font-size: clamp(36px,5.5vw,64px); font-weight: 300; color: var(--w100); text-decoration: none; opacity: .2; transition: opacity .2s, letter-spacing .25s; letter-spacing: -.03em; }
#menu ul li a:hover { opacity: 1; letter-spacing: -.01em; }
#menu .mc { position: absolute; bottom: 48px; left: 80px; }
#menu .mc a { display: block; font-size: 13px; color: var(--w30); text-decoration: none; font-weight: 300; margin-bottom: 4px; }

/* PAGE HEADER */
.page-header {
  padding: 120px 72px 72px;
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 40px;
}

.page-header h1 {
  font-size: clamp(52px, 8vw, 106px);
  font-weight: 300;
  color: var(--w100);
  letter-spacing: -.04em;
  line-height: .95;
}

/* TOGGLE */
.toggle-wrap { display: flex; gap: 2px; padding-bottom: 6px; flex-shrink: 0; }
.toggle-btn {
  font-family: var(--font);
  font-size: 11px;
  font-weight: 400;
  color: var(--w30);
  background: none;
  border: 1px solid var(--bdr);
  padding: 9px 18px;
  cursor: none;
  transition: color .2s, background .2s, border-color .2s;
}
.toggle-btn:first-child { border-radius: 2px 0 0 2px; }
.toggle-btn:last-child { border-radius: 0 2px 2px 0; }
.toggle-btn.active { color: var(--ink); background: var(--w100); border-color: var(--w100); }

/* GRID */
.grid-wrap { padding: 3px; transition: opacity .3s ease; }
.grid-wrap.shuffling { opacity: 0; }

.grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  gap: 3px;
}

/* ── PRODUCT grid spans — mix of 2 and 3 across ── */
/* Row 1: 2 across — 7+5 */
.pp-1 { grid-column: span 7; aspect-ratio: 16/9; }
.pp-2 { grid-column: span 5; aspect-ratio: 4/3; }
/* Row 2: 3 across — 4+4+4 */
.pp-3 { grid-column: span 4; aspect-ratio: 1/1; }
.pp-4 { grid-column: span 4; aspect-ratio: 1/1; }
.pp-5 { grid-column: span 4; aspect-ratio: 1/1; }

/* ── BRAND grid spans — different asymmetry ── */
/* Row 1: 2 across — 5+7 */
.bp-1 { grid-column: span 5; aspect-ratio: 4/3; }
.bp-2 { grid-column: span 7; aspect-ratio: 16/9; }
/* Row 2: 3 across — 4+4+4 */
.bp-3 { grid-column: span 4; aspect-ratio: 4/3; }
.bp-4 { grid-column: span 4; aspect-ratio: 4/3; }
.bp-5 { grid-column: span 4; aspect-ratio: 4/3; }

/* ── ALL mixed grid spans ── */
/* Row 1: 2 across — 7+5 */
.ap-1 { grid-column: span 7; aspect-ratio: 16/9; }
.ap-2 { grid-column: span 5; aspect-ratio: 4/3; }
/* Row 2: 3 across — 4+4+4 */
.ap-3 { grid-column: span 4; aspect-ratio: 1/1; }
.ap-4 { grid-column: span 4; aspect-ratio: 1/1; }
.ap-5 { grid-column: span 4; aspect-ratio: 1/1; }
/* Row 3: 2 across — 5+7 */
.ap-6 { grid-column: span 5; aspect-ratio: 4/3; }
.ap-7 { grid-column: span 7; aspect-ratio: 16/9; }
/* Row 4: 3 across — 4+4+4 */
.ap-8  { grid-column: span 4; aspect-ratio: 4/3; }
.ap-9  { grid-column: span 4; aspect-ratio: 4/3; }
.ap-10 { grid-column: span 4; aspect-ratio: 4/3; }

/* CARD */
.card {
  position: relative;
  overflow: hidden;
  cursor: none;
}

/* Image layer sits behind text, gets dimmed independently */
.card-img {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  filter: brightness(0.65);
  transition: filter .35s ease;
}

.card:hover .card-img { filter: brightness(0.85); }

.c1  { background: #161A18; }
.c2  { background: #18161A; }
.c3  { background: #1A1816; }
.c4  { background: #161818; }
.c5  { background: #181A16; }
.c6  { background: #1C1816; }
.c7  { background: #16181C; }
.c8  { background: #181C18; }
.c9  { background: #1C1618; }
.c10 { background: #16181A; }

/* Client name — bottom left always visible */
.card-info {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  padding: 80px 20px 20px;
  background: linear-gradient(to top, rgba(10,10,8,.88) 0%, rgba(10,10,8,.4) 60%, transparent 100%);
  z-index: 3;
  pointer-events: none;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  align-items: flex-start;
  gap: 6px;
}

.card-client {
  font-size: clamp(18px, 2vw, 24px);
  font-weight: 500;
  color: var(--w100);
  letter-spacing: -.02em;
  line-height: 1.2;
}

/* Sentence sits above client name, hidden by default */
.card-sentence {
  font-size: clamp(18px, 2vw, 24px);
  font-weight: 300;
  color: var(--w100);
  letter-spacing: -.02em;
  line-height: 1.3;
  opacity: 0;
  max-height: 120px;
  overflow: hidden;
  transition: opacity .25s ease, max-height .25s ease;
  margin-bottom: 10px;
}

.card:hover .card-sentence {
  opacity: 1;
  max-height: 60px;
}

/* Lock — top left */
.card-lock {
  position: absolute;
  top: 14px; left: 14px;
  width: 26px; height: 26px;
  border-radius: 50%;
  background: rgba(14,14,12,.65);
  backdrop-filter: blur(6px);
  border: 1px solid var(--bdr);
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; z-index: 3;
}

/* Hover */
.card-hover {
  position: absolute; inset: 0;
  opacity: 0; transition: opacity .2s;
  z-index: 4;
  pointer-events: none;
}

.card:hover .card-hover { opacity: 1; }
.card-hover.nda {
  background: rgba(8,8,6,.88);
  display: flex; flex-direction: column;
  justify-content: flex-end; align-items: flex-start;
  padding: 18px 16px;
  pointer-events: all;
}
.nda-text { font-size: 13px; font-weight: 300; color: var(--w30); line-height: 1.5; }

/* FOOTER */
footer { border-top: 1px solid var(--bdr); padding: 32px 72px; display: flex; justify-content: space-between; align-items: center; margin-top: 3px; }
.fl { font-size: 14px; font-weight: 300; color: var(--w30); }
footer ul { display: flex; gap: 24px; list-style: none; }
footer ul a { font-size: 12px; font-weight: 300; color: var(--w15); text-decoration: none; transition: color .2s; }
footer ul a:hover { color: var(--w60); }
.fc { font-size: 11px; color: var(--w15); }

/* MOBILE */
@media (max-width: 768px) {
  .page-header { flex-direction: column; align-items: flex-start; padding: 80px 28px 48px; }
  .grid-wrap { padding: 2px; }
  .grid { gap: 2px; }
  /* All cards go single column on mobile */
  .ap-1, .ap-2, .ap-3, .ap-4, .ap-5,
  .ap-6, .ap-7, .ap-8, .ap-9, .ap-10,
  .pp-1, .pp-2, .pp-3, .pp-4, .pp-5,
  .bp-1, .bp-2, .bp-3, .bp-4, .bp-5 {
    grid-column: span 12;
    aspect-ratio: 16/9;
  }
  footer { padding: 28px; flex-direction: column; gap: 16px; }
}
</style>
</head>
<body>

<div id="cur"></div>
<div id="cur-label">View</div>

<div id="hbg"><span></span><span></span><span></span></div>

<div id="menu">
  <ul>
    <li><a href="#">Home</a></li>
    <li><a href="#">Work</a></li>
    <li><a href="#">About</a></li>
    <li><a href="#">Writing</a></li>
    <li><a href="#">Ask me</a></li>
  </ul>
  <div class="mc">
    <a href="#">hello@allisonsarno.com</a>
    <a href="#">LinkedIn</a>
  </div>
</div>

<div class="page-header">
  <h1>Work</h1>
  <div class="toggle-wrap">
    <button class="toggle-btn active" onclick="setFilter('all')" id="btn-all">All</button>
    <button class="toggle-btn" onclick="setFilter('product')" id="btn-product">Product & UX</button>
    <button class="toggle-btn" onclick="setFilter('brand')" id="btn-brand">Brand & Visual</button>
  </div>
</div>

<div class="grid-wrap" id="grid-wrap">
  <div class="grid" id="grid"></div>
</div>

<footer>
  <div class="fl">Allison Sarno</div>
  <ul><li><a href="#">LinkedIn</a></li><li><a href="#">Instagram</a></li><li><a href="#">hello@allisonsarno.com</a></li></ul>
  <div class="fc">© 2025</div>
</footer>

<script>
const cur = document.getElementById('cur');
const curLabel = document.getElementById('cur-label');
document.addEventListener('mousemove', e => {
  cur.style.left = e.clientX + 'px';
  cur.style.top = e.clientY + 'px';
  curLabel.style.left = e.clientX + 'px';
  curLabel.style.top = (e.clientY + 28) + 'px';
});

const hbg = document.getElementById('hbg');
const menu = document.getElementById('menu');
hbg.addEventListener('click', () => menu.classList.toggle('on'));
menu.addEventListener('click', e => { if (e.target === menu) menu.classList.remove('on'); });

const projects = {
  product: [
    { id:'p1', client:'Unique.AI',  title:'AI-enabled financial services platform', sentence:'Password protected — get in touch to discuss the work.', year:'2022–23', color:'c3', nda:true, ndaMsg:'Password protected — request access' },
    { id:'p2', client:'Expeerly',   title:'Video review platform and design system', sentence:'A full platform redesign, design system, and marketing site — built partly in Cursor.', year:'2024', color:'c2' },
    { id:'p3', client:'Everskin',   title:'A digitally empowered journey to your best skin', sentence:'A seamless experience from initial engagement to in-clinic and at-home care.', year:'2024', color:'c1' },
    { id:'p4', client:'TomoDomo',   title:'Complete booking and client management', sentence:'Internal room management and a consumer-facing booking flow, designed end to end.', year:'2023', color:'c4' },
    { id:'p5', client:'Ava',        title:'Mobile product design and creative leadership', sentence:'Brand, product, and marketing design for a funded Swiss femtech startup.', year:'2019–21', color:'c5' },
  ],
  brand: [
    { id:'b1', client:'Expeerly',     title:'Brand identity for a Swiss video platform', sentence:'Visual identity, typography, colour system, and brand guidelines.', year:'2024', color:'c6' },
    { id:'b2', client:'TomoDomo',     title:'Brand system for a coworking platform', sentence:'Logo, identity, and visual language for a Swiss space-booking platform.', year:'2023', color:'c7' },
    { id:'b3', client:'Nuavo',        title:'Identity for a Zurich startup', sentence:'Full brand identity from naming through to visual system.', year:'2023', color:'c8' },
    { id:'b4', client:'Kumi',         title:'Premium brand for a South African real estate company', sentence:'Visual identity and brand system positioned for a competitive market.', year:'2022', color:'c9' },
    { id:'b5', client:'Peak Product', title:'Brand identity for a product coaching practice', sentence:'Clean, confident positioning for a senior professional audience.', year:'2022', color:'c10' },
  ]
};

// All view — mixed, intentional order, spans ap-1 through ap-10
const allSpans  = ['ap-1','ap-2','ap-3','ap-4','ap-5','ap-6','ap-7','ap-8','ap-9','ap-10'];
const allOrder  = [
  projects.product[0], // Unique.AI — hero
  projects.product[1], // Expeerly product
  projects.product[2], // Everskin
  projects.brand[0],   // Expeerly brand
  projects.brand[2],   // Nuavo
  projects.brand[3],   // Kumi
  projects.product[3], // TomoDomo product
  projects.brand[1],   // TomoDomo brand
  projects.product[4], // Ava
  projects.brand[4],   // Peak Product
];

// Product view spans
const productSpans = ['pp-1','pp-2','pp-3','pp-4','pp-5'];
// Brand view spans
const brandSpans   = ['bp-1','bp-2','bp-3','bp-4','bp-5'];

const seeds = {
  'p1': '10', 'p2': '20', 'p3': '30', 'p4': '40', 'p5': '50',
  'b1': '60', 'b2': '70', 'b3': '80', 'b4': '90', 'b5': '100'
};

function makeCard(p, spanClass) {
  const div = document.createElement('div');
  div.className = `card ${spanClass} ${p.color}`;
  const seed = seeds[p.id] || '10';

  let inner = `<div class="card-img" style="background-image:url(https://picsum.photos/seed/${seed}/1200/900)"></div>`;

  if (p.nda) inner += `<div class="card-lock">🔒</div>`;

  // Card info — sentence (hidden by default) above client name
  if (!p.nda) {
    inner += `
      <div class="card-info">
        <div class="card-sentence">${p.sentence}</div>
        <div class="card-client">${p.client}</div>
      </div>`;
  } else {
    inner += `<div class="card-info"><div class="card-client">${p.client}</div></div>`;
    inner += `<div class="card-hover nda"><div class="nda-text">${p.ndaMsg}</div></div>`;
  }

  div.innerHTML = inner;
  div.addEventListener('mouseenter', () => { cur.classList.add('big'); if (!p.nda) curLabel.classList.add('on'); });
  div.addEventListener('mouseleave', () => { cur.classList.remove('big'); curLabel.classList.remove('on'); });
  return div;
}

let currentFilter = 'all';
const gridWrap = document.getElementById('grid-wrap');
const grid = document.getElementById('grid');

function renderGrid(filter) {
  gridWrap.classList.add('shuffling');
  setTimeout(() => {
    grid.innerHTML = '';
    if (filter === 'all') {
      allOrder.forEach((p, i) => grid.appendChild(makeCard(p, allSpans[i])));
    } else if (filter === 'product') {
      projects.product.forEach((p, i) => grid.appendChild(makeCard(p, productSpans[i])));
    } else {
      projects.brand.forEach((p, i) => grid.appendChild(makeCard(p, brandSpans[i])));
    }
    gridWrap.classList.remove('shuffling');
  }, 300);
}

function setFilter(type) {
  if (type === currentFilter) return;
  currentFilter = type;
  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + type).classList.add('active');
  renderGrid(type);
  window.scrollTo(0, 0);
}

renderGrid('all');
</script>
</body>
</html>
